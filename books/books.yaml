# Reading log — one block per book.
#
# To add a book, copy an existing block and edit it. Keep the leading "- " and
# the two-space indentation on the lines under it. Order doesn't matter; books
# are grouped by year automatically (newest year first), and within a year the
# most recently finished book shows first.
#
# Fields:
#   title    (required) — keep the double quotes; they let titles contain colons
#   author   (required)
#   finished (required) — when you finished it. Any of these formats work:
#                         "March 2022", "Mar 2022", 2022-03, or just 2022.
#   rating   (optional) — liked, fine, or disliked
#   note     (optional) — free text after `>-`; write as many lines as you like,
#                         indented to match. No quotes or commas needed.
#
# Covers are found automatically: the build searches Open Library by title +
# author and caches the result in books/cover-cache.json, so you normally only
# type title, author and finished. To override a wrong/missing cover, add one of
# `coverId: 12345`, `isbn: "..."`, or `cover: "https://.../image.jpg"` to a block.

- title: "The Poet Empress"
